<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Form DRF</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://unpkg.com/alpinejs" defer></script>
</head>

<body class="bg-slate-100 flex items-center justify-center min-h-screen">

<div
    class="w-full max-w-lg bg-white p-6 rounded-2xl shadow"
    x-data="formHandler()"
>

    <h1 class="text-xl font-semibold mb-4">Create User</h1>

    <!-- GLOBAL ERROR -->
    <template x-if="globalError">
        <div class="mb-4 p-3 rounded-lg bg-red-50 text-red-600 text-sm border border-red-200"
             x-text="globalError">
        </div>
    </template>

    <form @submit.prevent="submit">

        <!-- EMAIL -->
        <div class="mb-4">
            <label class="block text-sm font-medium mb-1">Email</label>

            <input
                type="email"
                x-model="form.email"
                class="w-full border rounded-lg px-3 py-2 focus:ring focus:ring-blue-200"
            >

            <template x-if="errors.email">
                <p class="text-red-500 text-sm mt-1" x-text="errors.email[0]"></p>
            </template>
        </div>

        <!-- PASSWORD -->
        <div class="mb-4">
            <label class="block text-sm font-medium mb-1">Password</label>

            <input
                type="password"
                x-model="form.password"
                class="w-full border rounded-lg px-3 py-2 focus:ring focus:ring-blue-200"
            >

            <template x-if="errors.password">
                <p class="text-red-500 text-sm mt-1" x-text="errors.password[0]"></p>
            </template>
        </div>

        <!-- BUTTON -->
        <button
            type="submit"
            class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition"
            :disabled="loading"
        >
            <span x-show="!loading">Simpan</span>
            <span x-show="loading">Loading...</span>
        </button>

    </form>
</div>

<script>
function formHandler() {
    return {
        form: {
            email: '',
            password: ''
        },

        errors: {},
        globalError: '',
        loading: false,

        async submit() {
            this.loading = true;
            this.errors = {};
            this.globalError = '';

            try {
                const res = await axios.post('/api/users/', this.form);

                alert("Berhasil disimpan!");
                this.form.email = '';
                this.form.password = '';

            } catch (err) {

                if (!err.response) {
                    this.globalError = "Server tidak merespons";
                    return;
                }

                const data = err.response.data;

                // DRF field errors
                if (typeof data === 'object' && !data.detail) {
                    this.errors = data;
                }

                // DRF global error
                if (data.detail) {
                    this.globalError = data.detail;
                }

            } finally {
                this.loading = false;
            }
        }
    }
}
</script>

</body>
</html>
