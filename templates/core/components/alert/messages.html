{% if messages %}

    <div class="space-y-3 mb-4">

        {% for message in messages %}

            <div
                class="
                    rounded-xl
                    border
                    border-red-200
                    bg-red-50
                    px-4
                    py-3
                    text-sm
                    text-red-700
                "
            >
                {{ message }}
            </div>

        {% endfor %}

    </div>

{% endif %}
