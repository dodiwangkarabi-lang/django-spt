<div class="bg-white rounded-2xl shadow border border-slate-200">

    {% if title %}
        <div class="px-6 py-4 border-b border-slate-200">
            <h2 class="text-lg font-semibold text-slate-700">
                {{ title }}
            </h2>
        </div>
    {% endif %}

    <div class="p-6">
        {% block card_body %}
        {% endblock %}
    </div>

    {% if footer %}
        <div class="px-6 py-4 border-t border-slate-200">
            {{ footer }}
        </div>
    {% endif %}

</div>
