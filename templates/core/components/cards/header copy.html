<div class="px-6 py-4 border-b border-slate-200">

    <div class="flex items-center justify-between">

        <div>
            {% if title %}
                <h2 class="text-lg font-semibold text-slate-700">
                    {{ title }}
                </h2>
            {% endif %}

            {% if subtitle %}
                <p class="text-sm text-slate-500 mt-1">
                    {{ subtitle }}
                </p>
            {% endif %}
        </div>

        {% if actions %}
            <div>
                {{ actions }}
            </div>
        {% endif %}

    </div>

</div>
