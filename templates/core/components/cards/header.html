

<div class="flex justify-between items-center border-b pb-4">

    <div>
        <h1 class="text-2xl font-bold text-gray-800">
            {{ title|default:"Detail" }}
        </h1>
        {% if nomor_surat %}
        <p class="text-sm text-gray-500">Nomor: {{ nomor_surat }}</p>
        {% endif %}
    </div>

    <!-- Status -->
    {% if status %}
    <span class="px-4 py-2 text-sm rounded-full bg-yellow-100 text-yellow-700">
        {{ status }}
    </span>
    {% endif %}
</div>
