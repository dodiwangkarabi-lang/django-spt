<div class="mb-4">
    <label class="block text-sm font-medium mb-1">
        {{ label }}
    </label>

    <input
        {{ attrs|safe }}
        type="{{ type|default:'text' }}"
        x-model="form.{{ name }}"
        class="w-full border rounded-lg px-3 py-2 focus:ring focus:ring-blue-200"
    >

    {% include "core/components/forms/error.html" with field=name %}
</div>
