<div
    x-data="formHandler()"
    class="space-y-4"
>
    {% include content %}
</div>

<script>
function formHandler() {
    return {
        form: {},
        errors: {},
        globalError: '',
        loading: false,

        async submit(url) {
            this.loading = true;
            this.errors = {};
            this.globalError = '';

            try {
                const res = await axios.post(url, this.form);

                this.onSuccess(res);

            } catch (err) {

                const data = err.response?.data;

                if (!data) {
                    this.globalError = "Server tidak merespons";
                    return;
                }

                if (data.detail) {
                    this.globalError = data.detail;
                } else {
                    this.errors = data;
                }

            } finally {
                this.loading = false;
            }
        },

        onSuccess(res) {
            // override di halaman child
        }
    }
}
</script>
