<a
    :href="disabled ? undefined : '{{ href }}'"
    :class="disabled
        ? 'pointer-events-none opacity-50 cursor-not-allowed'
        : 'hover:bg-blue-700'"
    class="
        
        bg-blue-600
        text-white
        py-2
        px-4
        rounded-lg
        transition
    "
    {{ attrs|safe }}
>
    <span x-show="!loading">{{ label }}</span>
    <span x-show="loading">Loading...</span>
</a>
