<header class="h-16 bg-white shadow-sm flex items-center justify-between px-4 sm:px-6">
{% load auth_extras %}
    <!-- Left -->
    <div class="flex items-center gap-3">

        <!-- Mobile Button -->
        <button
            @click="sidebarOpen = true"
            class="lg:hidden text-3xl text-slate-700"
        >
            <ion-icon name="menu-outline"></ion-icon>
        </button>

        <h2 class="text-xl font-bold text-slate-800">
            {% block page_title %}
                {{ title }}
            {% endblock %}
        </h2>

    </div>

    <!-- Right -->
    <div class="flex items-center gap-4">

        <!-- Notification -->
        <!-- <button class="text-2xl text-slate-700 relative">
            <ion-icon name="notifications-outline"></ion-icon>

            <span class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full"></span>
        </button> -->

        <!-- User Dropdown -->
        <div
            x-data="{ open: false }"
            class="relative"
        >

            <!-- Button -->
            <button
                @click="open = !open"
                class="flex items-center gap-3"
            >

                <img
                    src="https://i.pravatar.cc/100"
                    alt="User"
                    class="w-10 h-10 rounded-full object-cover"
                >

                <div class="hidden sm:block text-left">
                    <p class="text-sm font-semibold text-slate-800">
                        {{ request.user.username }}
                    </p>

                    <p class="text-xs text-slate-500">
                        {% role_admin as ROLE_ADMIN %}
                        {% role_guru as ROLE_GURU %}
                        {% if request.user|user_has_group:ROLE_ADMIN %}Admin{% endif %}
                        {% if request.user|user_has_group:ROLE_GURU %}Guru{% endif %}
                    </p>
                </div>

                <ion-icon
                    name="chevron-down-outline"
                    class="text-slate-600"
                ></ion-icon>

            </button>

            <!-- Dropdown -->
            <div
                x-show="open"
                @click.outside="open = false"
                x-transition
                class="absolute right-0 mt-3 w-52 bg-white rounded-2xl shadow-lg border border-slate-100 overflow-hidden z-50"
            >

                <a
                    href="#"
                    class="flex items-center gap-3 px-4 py-3 hover:bg-slate-100 text-slate-700"
                >
                    <ion-icon name="person-outline"></ion-icon>
                    Profile
                </a>

                <a
                    href="#"
                    class="flex items-center gap-3 px-4 py-3 hover:bg-slate-100 text-slate-700"
                >
                    <ion-icon name="settings-outline"></ion-icon>
                    Settings
                </a>

                <div class="border-t border-slate-100"></div>

                <!-- Logout -->
                <form method="post" action="{% url 'accounts:logout' %}">
                    {% csrf_token %}

                    <button
                        type="submit"
                        class="w-full flex items-center gap-3 px-4 py-3 hover:bg-red-50 text-red-600"
                    >
                        <ion-icon name="log-out-outline"></ion-icon>
                        Logout
                    </button>
                </form>

            </div>

        </div>

    </div>

</header>
