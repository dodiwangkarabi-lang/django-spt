<!-- Overlay -->
<div
    x-show="sidebarOpen"
    x-transition.opacity
    @click="sidebarOpen = false"
    class="fixed inset-0 bg-black/50 z-40 lg:hidden"
></div>

<!-- Sidebar -->
<aside
    :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
    class="fixed lg:static inset-y-0 left-0 z-50 w-64 bg-slate-900 text-white transform lg:translate-x-0 transition-transform duration-300"
>

    <!-- Logo -->
    <div class="h-16 flex items-center px-6 border-b border-slate-800">
        <h1 class="text-2xl font-bold">
            SIPAS
        </h1>
    </div>

    <!-- Menu -->
    <nav class="p-4 space-y-2">
        {% for menu in sidebar_menus %}
        <a href="{% url menu.url %}"
           class="flex items-center gap-3 px-4 py-3 rounded-xl {% if menu.is_active %}bg-slate-800{% endif %}">
            <ion-icon name="{{ menu.icon }}"></ion-icon>
            {{ menu.title }}
        </a>

        
        {% endfor %}
    </nav>

</aside>
