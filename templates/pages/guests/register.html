{% extends "layouts/base.html" %} 

{% block navbar %}
{% endblock %}

{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="w-full max-w-md bg-white rounded-2xl shadow p-6 space-y-6">

    <!-- Header -->
    <div class="text-center">
      <h1 class="text-2xl font-bold text-gray-800">Register</h1>
      <p class="text-sm text-gray-500">Buat akun baru</p>
    </div>

    <!-- Form -->
    <form method="POST" class="space-y-4">

      <!-- Nama -->
      <div>
        <label class="block text-sm text-gray-700 mb-1">Nama Lengkap</label>
        <input 
          type="text"
          name="nama"
          placeholder="Nama lengkap"
          class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
        >
      </div>

      <!-- Username -->
      <div>
        <label class="block text-sm text-gray-700 mb-1">Username</label>
        <input 
          type="text"
          name="username"
          placeholder="Username"
          class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
        >
      </div>

      <!-- Email -->
      <div>
        <label class="block text-sm text-gray-700 mb-1">Email</label>
        <input 
          type="email"
          name="email"
          placeholder="Email"
          class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
        >
      </div>

      <!-- Role -->
      <div>
        <label class="block text-sm text-gray-700 mb-1">Role</label>
        <select 
          name="role"
          class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
        >
          <option value="">-- Pilih Role --</option>
          <option value="pegawai">Pegawai</option>
          <option value="kasubbag">Kasubbag</option>
          <option value="pimpinan">Pimpinan</option>
        </select>
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm text-gray-700 mb-1">Password</label>
        <input 
          type="password"
          name="password"
          placeholder="Password"
          class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
        >
      </div>

      <!-- Konfirmasi Password -->
      <div>
        <label class="block text-sm text-gray-700 mb-1">Konfirmasi Password</label>
        <input 
          type="password"
          name="password2"
          placeholder="Ulangi password"
          class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
        >
      </div>

      <!-- Button -->
      <button 
        type="submit"
        class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700"
      >
        Register
      </button>

    </form>

    <!-- Login Link -->
    <p class="text-sm text-center text-gray-500">
      Sudah punya akun?
      <a href="#" class="text-blue-600 hover:underline">Login</a>
    </p>

  </div>
</div>

{% endblock %}
