<div class="p-6 bg-gray-100 min-h-screen">
  <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow p-6 space-y-6">

    <!-- Header -->
    <div class="flex justify-between items-center border-b pb-4">
      <div>
        <h1 class="text-2xl font-bold text-gray-800">Approval SPT</h1>
        <p class="text-sm text-gray-500">Keputusan Kasubbag</p>
      </div>

      <span class="px-3 py-1 text-sm rounded-full bg-yellow-100 text-yellow-700">
        Menunggu Approval
      </span>
    </div>

    <!-- Ringkasan SPT -->
    <div class="bg-gray-50 p-4 rounded-lg grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <p class="text-sm text-gray-500">Nomor SPT</p>
        <p class="font-semibold text-gray-800">SPT-001/2026</p>
      </div>

      <div>
        <p class="text-sm text-gray-500">Tujuan</p>
        <p class="font-semibold text-gray-800">Seminar Nasional</p>
      </div>

      <div>
        <p class="text-sm text-gray-500">Tanggal</p>
        <p class="font-semibold text-gray-800">10 April 2026</p>
      </div>

      <div>
        <p class="text-sm text-gray-500">Pengaju</p>
        <p class="font-semibold text-gray-800">Dodiman</p>
      </div>
    </div>

    <!-- Catatan Review Sebelumnya -->
    <div>
      <h2 class="text-lg font-semibold text-gray-800 mb-2">Catatan Review</h2>
      <div class="bg-yellow-50 p-4 rounded-lg text-sm text-yellow-800">
        Periksa kembali kelengkapan dokumen sebelum disetujui.
      </div>
    </div>

    <!-- Form Approval -->
    <form method="POST" class="space-y-5">

      <!-- Catatan Keputusan -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Catatan Keputusan
        </label>
        <textarea 
          name="catatan_keputusan"
          rows="4"
          placeholder="Tambahkan catatan keputusan..."
          class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-blue-500 focus:outline-none"
        ></textarea>
      </div>

      <!-- Disposisi (Opsional saat approve) -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Disposisi (Opsional)
        </label>
        <input 
          type="text"
          name="disposisi"
          placeholder="Contoh: Laksanakan sesuai prosedur"
          class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
        >
      </div>

      <!-- Info -->
      <div class="bg-blue-50 p-3 rounded-lg text-sm text-blue-700">
        Pilih salah satu aksi untuk menentukan hasil approval SPT.
      </div>

      <!-- Aksi -->
      <div class="flex flex-wrap gap-3 pt-4 border-t">

        <button 
          type="submit"
          name="action"
          value="approve"
          class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700"
        >
          Approve
        </button>

        <button 
          type="submit"
          name="action"
          value="revisi"
          class="bg-yellow-500 text-white px-4 py-2 rounded-lg hover:bg-yellow-600"
        >
          Revisi
        </button>

        <button 
          type="submit"
          name="action"
          value="tolak"
          class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700"
        >
          Tolak
        </button>

      </div>

    </form>

  </div>
</div>
