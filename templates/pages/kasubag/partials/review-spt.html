<div class="p-6 bg-gray-100 min-h-screen">
  <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow p-6 space-y-6">

    <!-- Header -->
    <div class="border-b pb-4">
      <h1 class="text-2xl font-bold text-gray-800">Review SPT</h1>
      <p class="text-sm text-gray-500">Lakukan pemeriksaan dan berikan keputusan</p>
    </div>

    <!-- Ringkasan SPT -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-gray-50 p-4 rounded-lg">
      <div>
        <p class="text-sm text-gray-500">Tujuan</p>
        <p class="font-semibold text-gray-800">Menghadiri Seminar Nasional</p>
      </div>

      <div>
        <p class="text-sm text-gray-500">Tanggal</p>
        <p class="font-semibold text-gray-800">10 April 2026</p>
      </div>

      <div>
        <p class="text-sm text-gray-500">Peserta</p>
        <p class="font-semibold text-gray-800">Dodiman Takimpo</p>
      </div>

      <div>
        <p class="text-sm text-gray-500">Lampiran</p>
        <a href="#" class="text-blue-600 hover:underline">Lihat File</a>
      </div>
    </div>

    <!-- Form Review -->
    <form method="POST" class="space-y-5">
      
      <!-- Catatan Review -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Catatan Review
        </label>
        <textarea 
          name="catatan_review"
          rows="4"
          placeholder="Berikan catatan atau koreksi..."
          class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-blue-500 focus:outline-none"
        ></textarea>
      </div>

      <!-- Disposisi -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Disposisi
        </label>
        <input 
          type="text"
          name="disposisi"
          placeholder="Contoh: Laksanakan sesuai prosedur"
          class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
        >
      </div>

      <!-- Status Info -->
      <div class="bg-yellow-50 p-3 rounded-lg text-sm text-yellow-700">
        Pilih aksi di bawah ini untuk menentukan kelanjutan SPT.
      </div>

      <!-- Aksi -->
      <div class="flex flex-wrap gap-3 pt-4 border-t">

        <button 
          type="submit" 
          name="action" 
          value="approve"
          class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700"
        >
          Approve
        </button>

        <button 
          type="submit" 
          name="action" 
          value="revisi"
          class="bg-yellow-500 text-white px-4 py-2 rounded-lg hover:bg-yellow-600"
        >
          Minta Revisi
        </button>

        <button 
          type="submit" 
          name="action" 
          value="tolak"
          class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700"
        >
          Tolak
        </button>

      </div>

    </form>

  </div>
</div>
