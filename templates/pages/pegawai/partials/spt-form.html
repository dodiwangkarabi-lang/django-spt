<!-- Form -->
<form class="space-y-5">
  <!-- Tujuan -->
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">
      Tujuan SPT
    </label>
    <input
      type="text"
      placeholder="Contoh: Rapat dinas di kantor Bappeda"
      class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
    />
  </div>

  <!-- Tanggal -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">
        Tanggal Mulai
      </label>
      <input
        type="date"
        class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">
        Tanggal Selesai
      </label>
      <input
        type="date"
        class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
      />
    </div>
  </div>

  <!-- Peserta -->
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">
      Peserta / Anggota
    </label>
    <textarea
      rows="3"
      placeholder="Masukkan nama peserta dipisahkan koma"
      class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
    ></textarea>
  </div>

  <div>
    <button
      type="reset"
      class="px-4 py-2 rounded-lg border text-gray-600 hover:bg-gray-100"
    >
      Reset
    </button>

    <button
      type="submit"
      class="px-5 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700"
    >
      Ajukan SPT
    </button>

    <!-- Deskripsi -->
    <!-- <div>

                class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea>
    </div> -->
  </div>
