<div class="p-6 bg-gray-100 min-h-screen">
  <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow p-6 space-y-6">

    <!-- Header -->
    <div class="border-b pb-4">
      <h1 class="text-2xl font-bold text-gray-800">Upload Laporan SPT</h1>
      <p class="text-sm text-gray-500">Lengkapi laporan setelah pelaksanaan tugas</p>
    </div>

    <!-- Form -->
    <form method="POST" enctype="multipart/form-data" class="space-y-5">
      
      <!-- Laporan Kegiatan -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Laporan Kegiatan
        </label>
        <textarea 
          name="laporan"
          rows="5"
          placeholder="Tuliskan laporan kegiatan..."
          class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-blue-500 focus:outline-none"
        ></textarea>
      </div>

      <!-- Upload Dokumentasi -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Upload Dokumentasi
        </label>
        <input 
          type="file" 
          name="dokumentasi"
          multiple
          class="w-full border rounded-lg p-2 bg-white"
        >
        <p class="text-xs text-gray-500 mt-1">
          Bisa upload beberapa file (foto/pdf)
        </p>
      </div>

      <!-- Upload Hasil -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Upload Hasil Pekerjaan
        </label>
        <input 
          type="file" 
          name="hasil"
          class="w-full border rounded-lg p-2 bg-white"
        >
      </div>

      <!-- Catatan Tambahan -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Catatan Tambahan (Opsional)
        </label>
        <input 
          type="text"
          name="catatan"
          placeholder="Tambahkan catatan jika ada..."
          class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
        >
      </div>

      <!-- Status Info -->
      <div class="bg-blue-50 p-3 rounded-lg text-sm text-blue-700">
        Setelah laporan diupload, status SPT akan berubah menjadi 
        <span class="font-semibold">"Menunggu Verifikasi"</span>.
      </div>

      <!-- Submit -->
      <div class="flex justify-end gap-3 pt-4 border-t">
        <button 
          type="reset"
          class="px-4 py-2 rounded-lg border text-gray-600 hover:bg-gray-100"
        >
          Reset
        </button>

        <button 
          type="submit"
          class="px-5 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700"
        >
          Upload Laporan
        </button>
      </div>

    </form>
  </div>
</div>
