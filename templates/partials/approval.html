<div class="bg-white border rounded-xl p-4 mt-6 shadow-sm">

  <h2 class="text-lg font-semibold text-gray-700 mb-4">
    Persetujuan SPT
  </h2>

  <form id="formApproval" class="space-y-4">

    <!-- Catatan -->
    <div>
      <label class="block text-sm font-medium text-gray-600">
        Catatan (Opsional)
      </label>
      <textarea name="catatan"
        rows="3"
        class="w-full mt-1 px-3 py-2 border rounded-lg focus:ring focus:ring-blue-200"
        placeholder="Tambahkan catatan jika diperlukan"></textarea>
    </div>

    <!-- Aksi -->
    <div class="flex gap-3 pt-2">

      <button type="button"
        onclick="submitApproval('approve')"
        class="flex-1 bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition">
        ✅ Setujui
      </button>

      <button type="button"
        onclick="submitApproval('tolak')"
        class="flex-1 bg-red-600 text-white py-2 rounded-lg hover:bg-red-700 transition">
        ❌ Tolak
      </button>

    </div>

  </form>

</div>
