<div class="bg-gray-50 border rounded-xl p-4 mt-6">

  <h2 class="text-lg font-semibold text-gray-700 mb-4">
    Disposisi
  </h2>

  <form id="formDisposisi" class="space-y-4">

    <!-- Tujuan Disposisi -->
    <div>
      <label class="block text-sm font-medium text-gray-600">
        Tujuan Disposisi
      </label>
      <select name="tujuan"
        class="w-full mt-1 px-3 py-2 border rounded-lg focus:ring focus:ring-blue-200">
        <option value="">-- Pilih Pegawai --</option>
        <!-- nanti dari backend -->
        <option value="1">Pegawai A</option>
        <option value="2">Pegawai B</option>
      </select>
    </div>

    <!-- Catatan -->
    <div>
      <label class="block text-sm font-medium text-gray-600">
        Catatan
      </label>
      <textarea name="catatan"
        rows="3"
        class="w-full mt-1 px-3 py-2 border rounded-lg focus:ring focus:ring-blue-200"
        placeholder="Tambahkan catatan disposisi"></textarea>
    </div>

    <!-- Aksi -->
    <div class="flex gap-2 pt-2">

      <button type="button" onclick="submitDisposisi('approve')"
        class="flex-1 bg-green-600 text-white py-2 rounded-lg hover:bg-green-700">
        Approve
      </button>

      <button type="button" onclick="submitDisposisi('revisi')"
        class="flex-1 bg-yellow-500 text-white py-2 rounded-lg hover:bg-yellow-600">
        Revisi
      </button>

      <button type="button" onclick="submitDisposisi('tolak')"
        class="flex-1 bg-red-600 text-white py-2 rounded-lg hover:bg-red-700">
        Tolak
      </button>

    </div>

  </form>

</div>
