<div>
  <template x-if="isOpenModal">
    <div
      x-data="manajemenAkun()"
      class="fixed inset-0 z-50 flex items-center justify-center bg-black/50"
    >
      <div
        x-init="fetchDaftarAkun()"
        class="w-3/4 h-full bg-white p-6 overflow-y-auto"
      >
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-2xl font-bold">Manajemen Akun</h2>

          <a
            @click.prevent="closeModal()"
            href=""
            class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition"
          >
            Close
          </a>
        </div>

        <!-- body -->
        <div>
          <p class="text-sm text-gray-500 mb-2">
            Daftar akun yang terdaftar pada sistem 
            <a x-show="!isFormTambahAkun" @click.prevent="handlePressTambah()" href="">
                <ion-icon name="add-circle"></ion-icon>
            </a>
            
          </p>

          <!-- template form tambah akun -->
          <template x-if="isFormTambahAkun">
            

            <form 
                  @submit.prevent="submitForm()"
                  class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm my-4"
              >

              <div x-show="Object.keys(errors).length"
                class="bg-red-100 border border-red-300 text-red-700 p-3 rounded mb-4">

                <ul class="list-disc pl-5">
                    <template x-for="(messages, field) in errors" :key="field">
                        <template x-for="msg in messages" :key="msg">
                            <li x-text="msg"></li>
                        </template>
                    </template>
                </ul>

            </div>
                  
                  <div class="mb-4">
                      <label class="block text-sm font-medium text-gray-700 mb-1">
                          Nama
                      </label>

                      <input
                          type="text"
                          x-model="form.nama"
                          placeholder="Masukkan nama"
                          required
                          class="w-full border border-gray-300 rounded-lg px-3 py-2 
                                focus:outline-none focus:ring-2 focus:ring-blue-500 
                                focus:border-blue-500"
                      />
                  </div>

                  <div class="mb-4">
                      <label class="block text-sm font-medium text-gray-700 mb-1">
                          NIP
                      </label>

                      <input
                          type="text"
                          x-model="form.nip"
                          placeholder="Masukkan NIP"
                          required
                          class="w-full border border-gray-300 rounded-lg px-3 py-2 
                                focus:outline-none focus:ring-2 focus:ring-blue-500 
                                focus:border-blue-500"
                      />
                  </div>

                  <div class="mb-4" x-data="{ showPassword: false }">
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Password
                    </label>

                      <div class="relative">
                          
                          <input
                              :type="showPassword ? 'text' : 'password'"
                              x-model="form.password"
                              placeholder="Masukkan Password"
                              required
                              class="w-full border border-gray-300 rounded-lg px-3 py-2 pr-10
                                    focus:outline-none focus:ring-2 focus:ring-blue-500
                                    focus:border-blue-500"
                          />

                          <button
                              type="button"
                              @click="showPassword = !showPassword"
                              class="absolute inset-y-0 right-0 flex items-center px-3
                                    text-gray-500 hover:text-gray-700"
                          >
                              <ion-icon 
                                  :name="showPassword ? 'eye-off-outline' : 'eye-outline'">
                              </ion-icon>
                          </button>

                      </div>
                  </div>

                  <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Sebagai
                    </label>

                    <select
                        x-model="form.role"
                        required
                        class="w-full border border-gray-300 rounded-lg px-3 py-2
                              bg-white
                              focus:outline-none focus:ring-2 focus:ring-blue-500
                              focus:border-blue-500"
                    >
                        <option value="">Pilih</option>
                        <option value="pegawai">Pegawai</option>
                        <option value="kasubag">Kasubag</option>
                        <option value="pimpinan">Pimpinan</option>
                    </select>
                </div>

                  <div class="flex justify-end gap-2" x-show="!loading">
                      
                      <button
                          @click.prevent="batalkanTambahAkun()"
                          type="button"
                          class="px-4 py-2 rounded-lg border border-gray-300 
                                text-gray-700 hover:bg-gray-100 transition"
                      >
                          Batal
                      </button>

                      <button
                          type="submit"
                          class="bg-blue-600 text-white px-4 py-2 rounded-lg
                                hover:bg-blue-700 transition"
                      >
                      
                        <span x-text="isEdit ? 'update' : 'Tambah'"></span>
                      
                      
                          
                      </button>

                  </div>
                  <template x-if="loading">
                    <span>Loading...</span>
                  </template>

              </form>
          </template>

          <div x-show="loading">Loading...</div>

          <!-- template daftar akun -->
          <template x-if="tampilDaftarAkun">

          
          <template x-for="user in daftarAkun" :key="user.id">
            <div class="p-2 border mb-2 flex items-center flex-row justify-between overflow-auto">
              <span x-text="`${user.nama} - ${user.nip}`""></span>
              <div class="flex items-center gap-2">
    
                  <a 
                      class="p-2 rounded-lg text-blue-600 hover:bg-blue-100 hover:text-blue-700 transition duration-200"
                      href=""
                      @click.prevent="handlePressEdit(user)"
                  >
                      <ion-icon name="create-outline"></ion-icon>
                  </a>

                  <a 
                      class="p-2 rounded-lg text-red-600 hover:bg-red-100 hover:text-red-700 transition duration-200"
                      href=""
                      @click.prevent="handlePressDelete(user)"
                  >
                      <ion-icon name="trash-outline"></ion-icon>
                  </a>

              </div>
            </div>
          </template>
          </template>
        </div>
      </div>
    </div>
  </template>
</div>

<script>
  function getCookie(name) {
      let cookieValue = null;

      if (document.cookie && document.cookie !== '') {
          const cookies = document.cookie.split(';');

          for (let i = 0; i < cookies.length; i++) {
              const cookie = cookies[i].trim();

              if (cookie.substring(0, name.length + 1) === (name + '=')) {
                  cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                  break;
              }
          }
      }

      return cookieValue;
  }

  function manajemenAkun() {
    return {
      daftarAkun: [],
      loading: false,
      isFormTambahAkun: false,
      tampilDaftarAkun: true,
      // BASE_DIR: "http://127.0.0.1:8000",
      BASE_DIR: window.location.origin,
      errors: {},

      form: {

      },
      endpoint: `${this.BASE_DIR}/accounts/api/profiles/`,
      method: "post",
      isEdit: false,

      handlePressTambah() {
        this.resetForm();
        this.openFormTambahAkun();
        this.endpoint = `${this.BASE_DIR}/accounts/api/profiles/`;
        this.tampilDaftarAkun = false;
      },

      editData(item) {
        this.isEdit = true;
        this.endpoint = `${this.BASE_DIR}/accounts/api/profiles/${item.id}/`;
        this.method = "patch";
        this.form = item;
      },

      handlePressEdit(item) {
        this.editData(item);
        this.openFormTambahAkun();
        this.tampilDaftarAkun = false;
      },

      resetForm() {
        this.isEdit = false;
        this.endpoint = `${this.BASE_DIR}/accounts/api/profiles/`;
        this.method = "post";
        this.form = {};
      },

      openFormTambahAkun() {
        this.isFormTambahAkun = true;
      },
      closeFormTambahAkun() {
          this.isFormTambahAkun = false;
      },
      batalkanTambahAkun() {
        this.isFormTambahAkun = false;
        this.resetForm();
        this.tampilDaftarAkun = true;
        this.errors = {};
      },

      async handlePressDelete(item) {
        const result = confirm("Apakah anda yakin ingin menghapus akun ini?");
        if (result) {
          try {
            this.loading = true;
            await axios({
              method: "delete",
              url: `${this.BASE_DIR}/accounts/api/profiles/${item.id}/`,
              withCredentials: true,
              headers: {
                'X-CSRFToken': getCookie('csrftoken')
              }
            });
            this.fetchDaftarAkun();
          } catch (error) {
            console.error("Error loading daftar akun:", error);
          } finally {
            this.loading = false;
          }
        }
      },

      async submitForm() {
        try {
          this.loading = true;
          const res = await axios({
            method: this.method,
            url: this.endpoint,
            data: this.form,
            withCredentials: true,
            headers: {
              'X-CSRFToken': getCookie('csrftoken')
            }
          });
          // console.log(this.form);
            //   console.log(res.data);
            this.fetchDaftarAkun();
            this.closeFormTambahAkun();

            // reset form
            this.resetForm();
            this.isFormTambahAkun = false;
            this.tampilDaftarAkun = true;
            this.isEdit = false;

        } catch (error) {
          // console.log(this.endpoint);
          // console.error("Error loading daftar akunnya:", error.response?.data);
          // console.error("Error loading daftar akun:", error.response);
          // console.log(this.endpoint);
          if (error.response && error.response.data) {
            this.errors = error.response.data;
          }
          
        } finally {
          this.loading = false;
        }
      },

      async fetchDaftarAkun() {
        try {
          this.loading = true;
          const res = await axios.get(
            `${this.BASE_DIR}/accounts/api/profiles/`,
          );
          this.daftarAkun = res.data;
          // console.log(this.daftarAkun);
        } catch (error) {
          console.error("Error loading daftar akun:", error);
          
        } finally {
          this.loading = false;
        }
      },
    };
  }
</script>
