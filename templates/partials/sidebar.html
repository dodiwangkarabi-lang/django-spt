    <!-- Sidebar -->
  <aside 
    class="fixed top-0 left-0 w-64 h-screen bg-white shadow-md flex flex-col z-40" 
    x-data="modalSidebar()"
  >
    


    <!-- Header -->
    <div class="p-4 border-b flex flex-row justify-between">
      <h1 class="text-xl font-bold text-gray-800">SIPT</h1>
      <p class="text-sm text-gray-500"></p>
      {% if request.user.groups.first.name == "kasubag" %}
          <a href="" @click.prevent="openModal()">
            <ion-icon name="people"></ion-icon>
          </a>
      {% endif %}
    </div>

    <div
      class="overflow-auto"
    >

    <!-- Menu -->
    <nav class="flex-1 p-4 space-y-2">
      {% for item in sidebar_menu %}
        <a href="{% url item.url %}"
          class="flex items-center gap-3 px-3 py-2 rounded-lg 
          {% if request.resolver_match.view_name == item.url %}
            bg-gray-200 font-semibold text-black
          {% else %}
            text-gray-700 hover:bg-gray-100
          {% endif %}
        ">
          {{ item.label }}
        </a>
      {% endfor %}



      

      <!-- <a href="#"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-700 hover:bg-gray-100">
        🔔 Notifikasi
      </a> -->

    </nav>

    <!-- Footer user -->
<div class="p-4 border-t">
  
  <div class="flex items-center gap-3 mb-3">
    <div class="w-10 h-10 rounded-full bg-gray-300"></div>
    <div>
      <p class="text-sm font-semibold">{{ request.user.profile.nama }}</p>
      <p class="text-xs text-gray-500">{{ request.user.email }}</p>
    </div>
  </div>

  <!-- Link Profil -->
  <a href="{% url 'accounts_profile' %}"
     class="flex items-center gap-2 w-full text-sm text-gray-700 hover:bg-gray-100 px-3 py-2 rounded-lg mb-2">

    <!-- Ionicon -->
    <ion-icon name="person-circle-outline" class="text-lg"></ion-icon>
    <span>Profil</span>
  </a>

  <!-- Logout -->
  <a onclick="return confirm('Apakah anda ingin logout?')" 
     href="{% url 'accounts_logout' %}">
    <button class="w-full bg-red-500 text-white py-2 rounded-lg text-sm hover:bg-red-600 flex items-center justify-center gap-2">
      
      <ion-icon name="log-out-outline"></ion-icon>
      logout
    </button>
  </a>

</div>

  {% include "partials/kelola-akun.html" %}

    </div>

  </aside>


  <script>
    function modalSidebar() {
      return {
        isOpenModal: false,

        openModal() {
          this.isOpenModal = true
        },
        closeModal() {
          this.isOpenModal = false
        }
      }
    }
  </script>
