<div 
  class="space-y-3"
>

  <!-- Input file hidden -->
  <input
      type="file"
      multiple
      accept="application/pdf"
      x-ref="fileInput"
      class="hidden"
      @change="$dispatch('upload-lampiran', [...$event.target.files])"
  >

  <!-- Tombol -->
  <button
      type="button"
      @click="$refs.fileInput.click()"
      class="flex items-center gap-1 px-3 py-1.5 bg-blue-600 text-white text-sm rounded-lg hover:bg-blue-700 transition"
  >
      <ion-icon name="add-outline" class="text-lg"></ion-icon>
      Lampiran
  </button>

  <!-- pakai js -->
   <!-- empty state -->
    <template x-if="lampirans.length === 0">
        <div class="text-sm text-gray-500 italic">
            Belum ada lampiran
        </div>
    </template>

    <!-- list -->
    <template x-for="item in lampirans" :key="item.id">

        <div class="flex items-center justify-between border rounded-xl p-3">

            <!-- info -->
            <div class="flex flex-col">

                <a
                    :href="item.file"
                    target="_blank"
                    class="text-blue-600 hover:underline font-medium"
                    x-text="getFileName(item.file)"
                ></a>

                <span
                    class="text-xs text-gray-500"
                    x-text="formatTanggal(item.created_at)"
                ></span>

            </div>

            <!-- action -->
            <div class="flex gap-2">

                <button
                    type="button"
                    @click="$dispatch('delete-lampiran', item.id)"
                    class="px-3 py-1 text-sm bg-red-500 text-white rounded-lg hover:bg-red-600"
                >
                    Hapus
                </button>

            </div>

        </div>

    </template>
   <!-- end pakai js -->

  

</div>
