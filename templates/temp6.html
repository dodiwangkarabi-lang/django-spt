<div 
    x-data="uploadLampiran()"
    x-init="loadLampiran()"
    class="space-y-3"
>

    <!-- input file -->
    <input
        type="file"
        multiple
        accept="application/pdf"
        x-ref="fileInput"
        class="hidden"
        @change="handleFileChange"
    >

    <!-- tombol upload -->
    <button
        type="button"
        @click="$refs.fileInput.click()"
        class="flex items-center gap-1 px-3 py-1.5 bg-blue-600 text-white text-sm rounded-lg hover:bg-blue-700 transition"
    >
        <ion-icon name="add-outline"></ion-icon>
        Lampiran
    </button>

    <!-- empty state -->
    <template x-if="lampirans.length === 0">
        <div class="text-sm text-gray-500 italic">
            Belum ada lampiran
        </div>
    </template>

    <!-- list -->
    <template x-for="item in lampirans" :key="item.id">

        <div class="flex items-center justify-between border rounded-xl p-3">

            <!-- info -->
            <div class="flex flex-col">

                <a
                    :href="item.file_url"
                    target="_blank"
                    class="text-blue-600 hover:underline font-medium"
                    x-text="item.file_name"
                ></a>

                <span
                    class="text-xs text-gray-500"
                    x-text="item.created_at"
                ></span>

            </div>

            <!-- action -->
            <div class="flex gap-2">

                <button
                    type="button"
                    @click="handleDeleteLampiran(item)"
                    class="px-3 py-1 text-sm bg-red-500 text-white rounded-lg hover:bg-red-600"
                >
                    Hapus
                </button>

            </div>

        </div>

    </template>

</div>
