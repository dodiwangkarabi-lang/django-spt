{% extends "layouts/base.html" %} 



{% block content %}

      <!-- <h2 class="text-2xl font-bold text-gray-800">Dashboard Pegawai</h2> -->
      <p class="text-gray-600"></p>
      
      <!-- main -->
       <div
            x-data="modalRevisi()"
            x-init="loadLampiran()"
            @open-modal="openModal()"
            @close-modal="closeModal()"
            @delete-lampiran="handleDeleteLampiran($event.detail)"
            @upload-lampiran="handleUploadLampiran($event.detail)"
            @kirim-revisi-spt="handleKirimRevisiSPT($event.detail)"
            class="py-4 px-0 flex flex-col gap-4 bg-gray-100 min-h-screen"
        >
        <!-- pesan -->
        {% include "workflow/disposisi/partials/pesan.html" with judul_halaman="Detail" %}
        <!-- end pesan -->

        <!-- detail spt -->
        {% include "workflow/disposisi/partials/detail-spt.html" %}
        <!-- end detail spt -->

        <section>
            <template x-if="modalOpen">
                <!-- modal -->
                <div 
                    class="fixed inset-0 z-50 px-4 py-4 bg-black/50 flex items-start justify-center overflow-auto"
                >
                <!-- form -->
                {% include "workflow/disposisi/partials/revisi-form.html" %}
            </div>
                <!-- endform -->
            </template>
        </section>
      </div>
      <!-- end main -->


 

<script>
    function modalRevisi() {
        return {
            loading: false,
            modalOpen: false,
            lampirans: [],
            deleteLampiranBaseUrl: '{% url "spt:spt_api:hapus_lampiran" 0 %}',

            // methods
            async handleKirimRevisiSPT(data) {
                const payload = {
                    judul: data.judul,
                    deskripsi: data.deskripsi,
                    nomor_spt: data.nomor_spt,
                    tanggal_mulai: data.tanggal_mulai,
                    tanggal_selesai: data.tanggal_selesai
                }
                try {
                    this.loading = true;
                    
                    const result = await axios({
                        method: "post",
                        url: "{% url 'spt:spt_api:kirim_revisi_spt' spt.id %}",
                        data: payload,
                        headers: {
                            'X-CSRFToken': cookieValue
                        }
                    });
                    // simulasi loading
                    await new Promise(resolve => setTimeout(resolve, 1500));
                    // console.log(result);

                    // redirect
                    window.location.href = "{% url 'spt_detail' disposisi.spt.id %}";
                } catch (error) {
                    console.log(error);
                } finally {
                    this.loading = false;
                }
            },
            
            formatTanggal(value) {

                return new Date(value).toLocaleString('id-ID', {
                    day: '2-digit',
                    month: 'short',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                })
            },

            getFileName(path) {

                return path.split('/').pop()
            },

            async loadLampiran() {

                try {

                    const result = await axios.get(
                        "{% url 'spt:spt_api:list_lampiran' spt.id %}"
                    );

                    this.lampirans = result.data.data;

                    // console.log(this.lampirans);
                    

                } catch (error) {

                    console.error(error);

                }
            },

            openModal() {
                this.modalOpen = true
            },
            closeModal() {
                this.modalOpen = false
            },

            async handleUploadLampiran(files) {
                const formData = new FormData()

                files.forEach(file => {
                    formData.append('lampiran', file)
                })

                try {

                    const result = await axios({
                        method: 'post',
                        url: "{% url 'spt:spt_api:simpan_banyak_lampiran' spt.id %}",
                        data: formData,
                        headers: {
                            'X-CSRFToken': cookieValue,
                            'Content-Type': 'multipart/form-data'
                        }
                    })

                    // console.log(result)

                    alert('Upload berhasil')

                    // reload list
                    await this.loadLampiran()

                } catch (error) {

                    console.error(error)

                    alert('Upload gagal')

                }
                
            },

            async handleDeleteLampiran(lampiran_id) {
                const isConfirmed = confirm('Apakah Anda yakin ingin menghapus lampiran ini?');
                if (!isConfirmed) return;
                
                // hapus
                // console.log(url);
                const url = this.deleteLampiranBaseUrl.replace('/0/', `/${lampiran_id}/`);
                try {
                    const result = await axios({
                        method: 'post',
                        url: `${url}`,
                        headers: {
                            'X-CSRFToken': cookieValue
                        }
                    })
                    // console.log(result);

                    // reload list
                    await this.loadLampiran()

                    // reset input
                    // event.target.value = ''
                } catch (error) {
                    console.log(error);
                }
            }
        }
    }
</script>

<script>
    function aksiSPT() {
        return {
            loading: false,
            disabled: false,

            submit(url) {
                // if (this.loading) return;
                this.loading = true;
                this.disabled = true;
                window.location.href = url;
            }
        }
    }
</script>

{% endblock %}
